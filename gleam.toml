name = "assay"
version = "0.1.0"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.

description = "Effect checker for Gleam via sidecar .assay annotation files"
licences = ["Apache-2.0"]
repository = { type = "github", user = "alvivi", repo = "assay" }
links = [{ title = "Documentation", href = "https://hexdocs.pm/assay" }]
included_files = [
  "src",
  "priv",
  "gleam.toml",
  "manifest.toml",
  "README.md",
  "THEORY.md",
  "LICENSE",
]

# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
glance = ">= 6.0.0 and < 8.0.0"
simplifile = ">= 2.0.0 and < 3.0.0"
argv = ">= 1.0.0 and < 2.0.0"
filepath = ">= 1.1.2 and < 2.0.0"
tom = ">= 2.0.2 and < 3.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
glinter = ">= 2.11.1 and < 3.0.0"
qcheck = ">= 1.0.0 and < 2.0.0"

[tools.glinter.rules]
unused_exports = "off"
label_possible = "off"
thrown_away_error = "off"
error_context_lost = "off"
